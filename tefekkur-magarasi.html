    /* TEMEL DEĞİŞKENLER VE MAĞARA KARANLIĞI */

  <script>
    /* ========================================================= */
    /* --- EKRAN UYANIK TUTMA (WAKE LOCK API) --- */
    /* ========================================================= */
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); }
      } catch (err) { console.log(`Uyku kilidi alınamadı: ${err.message}`); }
    }
    function releaseWakeLock() {
      if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); }
    }
    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible') { requestWakeLock(); }
    });

    /* ========================================================= */
    /* --- 1. 3 BOYUTLU TOZ ZERRELERİ (FORWARD PARALLAX CANVAS) --- */
    /* ========================================================= */
    const canvas = document.getElementById('dustCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    const maxZ = 1000; 

    function initCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      particles = [];
      const particleCount = window.innerWidth < 768 ? 60 : 120; 
      
      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: (Math.random() - 0.5) * width * 2, 
          y: (Math.random() - 0.5) * height * 2,
          z: Math.random() * maxZ, 
          speed: Math.random() * 1.5 + 0.5 
        });
      }
    }

    function drawDust() {
      ctx.clearRect(0, 0, width, height);
      let cx = width / 2;
      let cy = height / 2;

      particles.forEach(p => {
        p.z -= p.speed; 
        
        if (p.z <= 0) {
          p.x = (Math.random() - 0.5) * width * 2;
          p.y = (Math.random() - 0.5) * height * 2;
          p.z = maxZ;
          p.speed = Math.random() * 1.5 + 0.5;
        }

        let px = (p.x / p.z) * 350 + cx;
        let py = (p.y / p.z) * 350 + cy;

        let radius = (1 - p.z / maxZ) * 2.5;
        let opacity = (1 - p.z / maxZ) * 0.7;

        if (px >= 0 && px <= width && py >= 0 && py <= height) {
          ctx.beginPath(); 
          ctx.arc(px, py, radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(212, 175, 55, ${opacity})`; 
          
          if(radius > 1.5) { 
            ctx.shadowBlur = radius * 2; 
            ctx.shadowColor = 'rgba(212, 175, 55, 0.4)'; 
          } else { 
            ctx.shadowBlur = 0; 
          }
          
          ctx.fill();
        }
      });
      requestAnimationFrame(drawDust);
    }
    
    window.addEventListener('resize', initCanvas);
    initCanvas(); drawDust();

    /* ========================================================= */
    /* --- 2. PÜRÜZSÜZ SES MOTORU (SADE VE HER SATIRDA VURAN) --- */
    /* ========================================================= */
    let audioCtx;
    let masterGain;
    let ugultuZamanlayici;
    let isikSesiGain; 

    function baslatSesMotoru() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.8;
        masterGain.connect(audioCtx.destination);

        // Sade, tek ve pürüzsüz bir zemin uğultusu (108 Hz)
        const drone = audioCtx.createOscillator();
        const droneGain = audioCtx.createGain();
        
        drone.type = 'sine'; 
        drone.frequency.value = 108; 
        droneGain.gain.value = 0.15; 
        
        drone.connect(droneGain); 
        droneGain.connect(masterGain);
        drone.start(); 

        // Her metinde vuracak olan yumuşak çınlama (432 Hz)
        const isikSesi = audioCtx.createOscillator();
        isikSesi.type = 'sine';
        isikSesi.frequency.value = 432; 
        isikSesiGain = audioCtx.createGain();
        isikSesiGain.gain.value = 0; 
        isikSesi.connect(isikSesiGain);
        isikSesiGain.connect(masterGain);
        isikSesi.start();

        derinUgultuTetikle();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function derinUgultuTetikle() {
      if (!audioCtx || audioCtx.state !== 'running') return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const panner = audioCtx.createStereoPanner();

      osc.type = 'sine'; 
      // Çok dipten gelen rüzgarımsı bir nefes (54 Hz)
      osc.frequency.setValueAtTime(54, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 12);

      const baslangicPan = Math.random() > 0.5 ? -1 : 1; 
      panner.pan.setValueAtTime(baslangicPan, audioCtx.currentTime);
      panner.pan.linearRampToValueAtTime(baslangicPan * -1, audioCtx.currentTime + 12);

      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 5); 
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 12);  

      osc.connect(gain); gain.connect(panner); panner.connect(masterGain);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 12);

      const sonrakiUygultuZamani = 15000 + Math.random() * 10000;
      ugultuZamanlayici = setTimeout(derinUgultuTetikle, sonrakiUygultuZamani);
    }

    // Her satırda vuracak olan sesin şiddeti
    function isikSesiTetikle(sure, ruhaniMi) {
      if (!audioCtx || !isikSesiGain) return;
      isikSesiGain.gain.cancelScheduledValues(audioCtx.currentTime);
      isikSesiGain.gain.setValueAtTime(0, audioCtx.currentTime);
      
      // Ayetlerde (ruhani=true) ses biraz daha yüksek (0.05), normal metinlerde çok hafif (0.02) vurur
      const tepeNoktasi = ruhaniMi ? 0.05 : 0.02;
      
      isikSesiGain.gain.linearRampToValueAtTime(tepeNoktasi, audioCtx.currentTime + 2); 
      isikSesiGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + sure / 1000); 
    }
    
    /* ========================================================= */
    /* --- 3. HİKAYE AKIŞI (ORİJİNAL SÜRELER) --- */
    /* ========================================================= */
    const senaryo = [
      { metin: "Rahmân ve Rahîm olan<br>Allah’ın adıyla...", sinif: "vurgu-buyuk", ozelSure: 5500, ruhani: true },
      { metin: "Hamd, âlemlerin Rabbi olan<br>Allah’a mahsustur." },
      { metin: "Salât ve selâm,<br>O’nun kutlu elçisinin üzerine olsun." },
      
      { metin: "Şimdi dış dünyanın o sağır edici<br>gürültüsünü dışarıda bırak..." },
      { metin: "Çünkü fıtratın,<br>uzun zamandır bu sükûnete muhtaç." },
      { metin: "“Ey insan!”" },
      { metin: "“Seni, o kerem sahibi<br>Rabbine karşı aldatan nedir?”<br><span class='kaynak-metin'>(İnfitâr Suresi, 6. Ayet)</span>", ozelSure: 6500, ruhani: true },
      { metin: "“Çoğaltma ve biriktirme tutkusu,<br>kabirlere varıncaya kadar<br>sizi oyalayıp durdu.”<br><span class='kaynak-metin'>(Tekâsür Suresi, 1-2. Ayetler)</span>", ozelSure: 7500, ruhani: true },
      
      { metin: "Şu bitmek bilmeyen<br>dünya telaşı içinde,<br>fıtratının o sessiz feryadını unuttun." },
      { metin: "Rızık endişesiyle kalbini yordun...<br>Halbuki Allah'ın elçisi<br>şöyle buyurmuştu:<br><span style='font-size: 0.85rem; color: #888; font-style: italic; white-space: normal;'>(Allah'ın selâmı ve rahmeti onun üzerine olsun)</span>", ozelSure: 6500 },
      { metin: "“Hiçbir nefis,<br>kendi rızkını tam olarak<br>almadan ölmez.”<br><span class='kaynak-metin'>(Hadis-i Şerif / İbn Mâce)</span>", ozelSure: 7000 },
      
      { metin: "Belki bugün taştan heykellerin<br>önünde eğilmediğini düşünüyorsun..." },
      { metin: "Fakat uğruna hakkı feda ettiğin<br>makamları, statüleri..." },
      { metin: "Seni esir alan tüketim hırsını<br>ve insanların beğenisini<br>kazanma çabanı bir düşün." },
      { metin: "Yüce Allah, Kur'an-ı Kerim'de<br>bu sarsıcı hakikati şöyle bildirir:" },
      { metin: "“Kendi arzu ve tutkularını (hevasını)<br>ilah edinen kimseyi gördün mü?”<br><span class='kaynak-metin'>(Furkân Suresi, 43. Ayet)</span>", ozelSure: 8000, ruhani: true },
      
      { metin: "İşte bunlar, kendi rızanla<br>boynuna geçirdiğin görünmez prangalar..." },
      { metin: "Ve kendi ellerinle yontup tapındığın<br><span class='kilit-kelime'>çağdaş putlardır.</span>", ozelSure: 6000 },
      
      { metin: "Oysa sen; eşyaya, fânilere<br>veya kendi heveslerine<br>kul olmak için yaratılmadın." },
      { metin: "“Ben cinleri ve insanları,<br>ancak bana kulluk etsinler<br>diye yarattım.”<br><span class='kaynak-metin'>(Zâriyât Suresi, 56. Ayet)</span>", ozelSure: 8000, ruhani: true },
      
      { metin: "Bütün peygamberlerin, çağları aşan<br>o sarsılmaz nidasına kulak ver:" },
      { metin: "Allah’tan başka<br>ilah yoktur.", sinif: "vurgu-buyuk", ozelSure: 6500, ruhani: true },
      
      { metin: "Tevhid; korkuyu, sevgiyi,<br>umudu ve teslimiyeti<br>yalnızca O'na tahsis etmektir." },
      { metin: "Çünkü...<br>“O, hükmüne kimseyi ortak etmez.”<br><span class='kaynak-metin'>(Kehf Suresi, 26. Ayet)</span>", ozelSure: 6500, ruhani: true },
      
      { metin: "Peki, Resûlullah efendimiz<br>şöyle buyurmadı mı?<br><span style='font-size: 0.85rem; color: #888; font-style: italic; white-space: normal;'>(Allah'ın selâmı ve rahmeti onun üzerine olsun)</span>", ozelSure: 6500 },
      { metin: "“Benim dünya ile ne işim olabilir ki?<br>Ben, bir ağacın gölgesinde soluklanıp<br>sonra yoluna devam eden<br>bir yolcu gibiyim.”<br><span class='kaynak-metin'>(Hadis-i Şerif / Tirmizî)</span>", ozelSure: 8500 },
      
      { metin: "Gün gelecek, o gölge kaybolacak." },
      { metin: "Ve geriye sadece şu sarsılmaz<br>hakikat kalacak:" },
      
      { metin: "“...‘Şüphesiz biz Allah’a aidiz<br>ve muhakkak ki O’na döneceğiz’...”<br><span class='kaynak-metin'>(Bakara Suresi, 156. Ayet)</span>", sinif: "kilit-kelime", ozelSure: 10000, ruhani: true }
    ];

    const okumaEkrani = document.getElementById('okumaEkrani');
    const baslangicEkrani = document.getElementById('baslangicEkrani');
    const baslaBtn = document.getElementById('baslaBtn');
    const durumUyarisi = document.getElementById('durumUyarisi');
    const ilerlemeCizgisi = document.getElementById('ilerlemeCizgisi');
    const nurHuzmesi = document.getElementById('nurHuzmesi');
    const temaRengiMeta = document.getElementById('temaRengi');

    let aktifSira = 0;
    let akisDurduMu = false;
    let zamanlayiciId = null;

    function sureHesapla(metin) {
      const kelimeSayisi = metin.split(' ').length;
      const hesaplananSure = (kelimeSayisi * 450) + 2500;
      return Math.max(4500, hesaplananSure); 
    }

    /* === TAM EKRAN (FULLSCREEN) YÖNETİMİ (GÜVENLİ) === */
    function tamEkranaGec() {
      try {
        let elem = document.documentElement;
        if (elem.requestFullscreen) { elem.requestFullscreen(); }
        else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
      } catch (e) {}
    }

    function tamEkrandanCik() {
      try {
        if (document.exitFullscreen) { document.exitFullscreen(); }
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
        else if (document.msExitFullscreen) { document.msExitFullscreen(); }
      } catch (e) {}
    }

    function sahneyiOynat() {
      const yuzde = (aktifSira / senaryo.length) * 100;
      ilerlemeCizgisi.style.width = yuzde + "%";

      if (aktifSira >= senaryo.length) {
        document.body.classList.add('safak-vakti');
        temaRengiMeta.setAttribute('content', '#f8f9fa'); 
        
        okumaEkrani.innerHTML = `<button class="basla-btn safak-btn" style="letter-spacing: 5px;" aria-label="Tevhid Konusuna Geri Dön" onclick="window.location.href='/tevhid-nedir.html'">O'na Dön...</button>`;        
        okumaEkrani.className = "metin-kutusu aktif";
        
        tamEkrandanCik();
        
        if(masterGain) masterGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 5);
        setTimeout(() => { 
          if(audioCtx) audioCtx.suspend(); 
          clearTimeout(ugultuZamanlayici); 
          releaseWakeLock(); 
        }, 5000);
        return;
      }

      if (akisDurduMu) return;

      const anlikSahne = senaryo[aktifSira];
      okumaEkrani.className = "metin-kutusu";
      okumaEkrani.innerHTML = `<span class="${anlikSahne.sinif || ''}">${anlikSahne.metin}</span>`;
      
      setTimeout(() => { okumaEkrani.classList.add('aktif'); }, 50);

      const ekrandaKalmaSuresi = anlikSahne.ozelSure || sureHesapla(anlikSahne.metin);

      isikSesiTetikle(ekrandaKalmaSuresi + 2000, anlikSahne.ruhani); 

      if (anlikSahne.ruhani) {
        nurHuzmesi.classList.add('parla');
        if(navigator.vibrate) navigator.vibrate(50); 
      } else {
        nurHuzmesi.classList.remove('parla');
      }

      zamanlayiciId = setTimeout(() => { sahneyiKapatVeGec(); }, ekrandaKalmaSuresi);
    }

    function sahneyiKapatVeGec() {
      if (akisDurduMu) return;
      
      okumaEkrani.classList.remove('aktif');
      okumaEkrani.classList.add('cikis');
      nurHuzmesi.classList.remove('parla'); 
      
      zamanlayiciId = setTimeout(() => {
        aktifSira++;
        sahneyiOynat();
      }, 3000); 
    }

    function duraklatVeyaDevamEt() {
      if (aktifSira >= senaryo.length || baslangicEkrani.style.display !== 'none') return;

      if (akisDurduMu) {
        akisDurduMu = false;
        durumUyarisi.classList.remove('goster');
        okumaEkrani.style.opacity = '1';
        if (audioCtx) audioCtx.resume(); 
        requestWakeLock(); 
        sahneyiKapatVeGec(); 
      } else {
        akisDurduMu = true;
        clearTimeout(zamanlayiciId);
        durumUyarisi.classList.add('goster');
        okumaEkrani.style.opacity = '0.2'; 
        if (audioCtx) audioCtx.suspend(); 
        releaseWakeLock(); 
      }
    }

    // Tıklama ile duraklat/devam et
    document.body.addEventListener('click', duraklatVeyaDevamEt);
    
    // Klavyeden SPACE (Boşluk) tuşu ile duraklat/devam et
    window.addEventListener('keydown', (e) => {
      // Sadece sahnedeysen ve boşluk tuşuna basılırsa
      if ((e.code === 'Space' || e.key === ' ') && baslangicEkrani.style.display === 'none') {
        e.preventDefault(); // Boşluk tuşunun sayfayı aşağı kaydırmasını engeller
        duraklatVeyaDevamEt();
      }
    });

    baslaBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      baslangicEkrani.style.opacity = '0';
      baslangicEkrani.style.filter = 'blur(10px)';
      baslangicEkrani.style.letterSpacing = '4px'; 
      
      requestWakeLock(); 
      baslatSesMotoru(); 
      tamEkranaGec();
      
      setTimeout(() => {
        baslangicEkrani.style.display = 'none';
        sahneyiOynat();
      }, 2000); 
    });
    
    /* Servis Çalışanı (Service Worker - Offline PWA Desteği) */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
<div class="alt-sis"></div>	
</body>
